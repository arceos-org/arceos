[package]
name = "arceos-std-httpclient"
version = "0.1.0"
edition.workspace = true
authors = ["Yuekai Jia <equation618@gmail.com>", "Dashuai Wu <wudashuaijss@foxmail.com>"]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[features]
default = []
dns = ["arceos-rust/dns"]

[target.'cfg(target_os = "hermit")'.dependencies]
arceos-rust = { workspace = true, default-features = true, features = ["net", "log-level-debug"] }
