[package]
authors = ["Yuekai Jia <equation618@gmail.com>"]
description = "ArceOS global memory allocator"
documentation = "https://arceos-org.github.io/arceos/axalloc/index.html"
edition.workspace = true
homepage.workspace = true
license.workspace = true
name = "axalloc"
readme = "README.md"
repository = "https://github.com/arceos-org/arceos/tree/main/modules/axalloc"
version.workspace = true

[features]
default = ["tlsf", "axallocator/page-alloc-256m"]
axvisor = ["dep:buddy-slab-allocator"]
buddy = ["dep:axallocator", "axallocator/buddy"]
slab = ["dep:axallocator", "axallocator/slab"]
tlsf = ["dep:axallocator", "axallocator/tlsf"]
level-1 = []
page-alloc-4g = ["dep:axallocator", "axallocator/page-alloc-4g"]   # Support up to 4GB memory capacity (default: 256MB)
page-alloc-64g = ["dep:axallocator", "axallocator/page-alloc-64g"] # Support up to 64GB memory capacity (default: 256MB)
tracking = ["dep:percpu", "dep:axbacktrace"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "doc_cfg"]

[dependencies]
axallocator = {workspace = true, features = ["bitmap"], optional = true}
axbacktrace = {workspace = true, optional = true}
axerrno.workspace = true
buddy-slab-allocator = { version = "0.1.1", optional = true }
cfg-if.workspace = true
kspin.workspace = true
log.workspace = true
memory_addr.workspace = true
percpu = {workspace = true, optional = true}
strum = {version = "0.27.2", default-features = false, features = ["derive"]}
