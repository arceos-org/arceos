[package]
name = "axnet-ng"
version.workspace = true
edition.workspace = true
authors = ["Mivik <mivikq@gmail.com>"]
description = "ArceOS network module"
license.workspace = true
homepage.workspace = true
repository = "https://github.com/arceos-org/arceos/tree/main/modules/axnet"

[features]
vsock = ["axdriver/vsock"]

[dependencies]
async-channel = { version = "2.5", default-features = false }
async-trait = "0.1"
axconfig = { workspace = true }
axdriver = { workspace = true, features = ["net"] }
axerrno = { workspace = true }
axfs-ng = { workspace = true }
axfs-ng-vfs = { workspace = true }
axhal = { workspace = true }
axio = { workspace = true }
axpoll = { workspace = true }
axsync = { workspace = true }
axtask = { workspace = true, features = ["irq", "multitask"] }
bitflags = "2.9"
cfg-if = { workspace = true }
enum_dispatch = "0.3"
event-listener = { version = "5.4", default-features = false }
hashbrown = "0.16"
lazy_static = { workspace = true }
log = { workspace = true }
ringbuf = { version = "0.4", default-features = false, features = ["alloc"] }
spin = { workspace = true }

[dependencies.smoltcp]
package = "starry-smoltcp"
version = "0.12.1-preview.1"
default-features = false
features = [
  "alloc",
  "log",             # no std
  "async",
  "medium-ethernet",
  "medium-ip",
  "proto-ipv4",
  "proto-ipv6",
  "socket-raw",
  "socket-icmp",
  "socket-udp",
  "socket-tcp",
  "socket-dns",
  # "fragmentation-buffer-size-65536", "proto-ipv4-fragmentation",
  # "reassembly-buffer-size-65536", "reassembly-buffer-count-32",
  # "assembler-max-segment-count-32",
]
