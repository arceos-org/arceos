[package]
name = "axdma"
edition.workspace = true
version.workspace = true
authors = ["Zhour Rui <zrufo747@outlook.com>"]
description = "ArceOS global DMA allocator"
license.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true
repository = "https://github.com/arceos-org/arceos/tree/main/modules/axdma"
documentation = "https://arceos-org.github.io/arceos/axdma/index.html"

[features]
default = []
hv = ["dep:buddy-slab-allocator"]

[dependencies]
axallocator.workspace = true
axalloc.workspace = true
axconfig.workspace = true
buddy-slab-allocator = { version = "0.1.1", optional = true }
axerrno.workspace = true
axhal.workspace = true
axmm.workspace = true
crate_interface.workspace = true
kspin.workspace = true
log.workspace = true
memory_addr.workspace = true
